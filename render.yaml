# Render Blueprint — описывает сервис и базу. Render прочитает этот файл
# при создании Blueprint и поднимет всё автоматически.
services:
  - type: web
    name: messenger
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT server.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true        # Render сам сгенерирует надёжный ключ
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: messenger-db
          property: connectionString

databases:
  - name: messenger-db
    plan: free
